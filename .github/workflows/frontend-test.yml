name: Frontend Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/frontend-test.yml'
      - 'plugins.v2/subscribeassistantenhanced/frontend/**'
      - 'tests/v2/subscribeassistantenhanced/frontend/**'

permissions:
  contents: read

concurrency:
  group: frontend-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: plugins.v2/subscribeassistantenhanced/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: yarn
          cache-dependency-path: plugins.v2/subscribeassistantenhanced/frontend/yarn.lock

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Check formatting
        run: yarn format:check

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: plugins.v2/subscribeassistantenhanced/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: yarn
          cache-dependency-path: plugins.v2/subscribeassistantenhanced/frontend/yarn.lock

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Lint
        run: yarn lint

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: plugins.v2/subscribeassistantenhanced/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: yarn
          cache-dependency-path: plugins.v2/subscribeassistantenhanced/frontend/yarn.lock

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Unit tests with coverage
        run: yarn test:coverage

      - name: Build distributable
        run: yarn build

      - name: Verify committed distributable
        run: |
          if [ -n "$(git status --porcelain -- dist)" ]; then
            git status --short -- dist
            exit 1
          fi
